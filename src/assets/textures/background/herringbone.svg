<svg xmlns="http://www.w3.org/2000/svg" width="240" height="256" viewBox="0 0 240 256">
  <defs>
    <pattern id="herringbone" x="0" y="0" width="48" height="64" patternUnits="userSpaceOnUse">
      <!--
        Herringbone floorboard pattern. Plank size: 32×16 (L=2W).
        Tile: 48×64 — one full herringbone repeat, no gaps, no overlaps.

        Group 1 (y=0–32): two horizontal planks left (x=0–32) + one vertical plank right (x=32–48)
        Group 2 (y=32–64): one vertical plank left (x=0–16) + two horizontal planks right (x=16–48)
        The 16px offset between groups creates the characteristic herringbone staircase.
      -->

      <!-- Group 1 — horizontal planks (left) -->
      <rect x="0"  y="0"  width="32" height="16" fill="#c8a060" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="0"  y="16" width="32" height="16" fill="#b88040" stroke="#5a3810" stroke-width="0.8"/>
      <line x1="2"  y1="6"  x2="30" y2="6"  stroke="#d4aa68" stroke-width="0.4" opacity="0.5"/>
      <line x1="2"  y1="11" x2="30" y2="11" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="2"  y1="22" x2="30" y2="22" stroke="#d4aa68" stroke-width="0.4" opacity="0.5"/>
      <line x1="2"  y1="28" x2="30" y2="28" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Group 1 — vertical plank (right) -->
      <rect x="32" y="0"  width="16" height="32" fill="#d4a860" stroke="#5a3810" stroke-width="0.8"/>
      <line x1="37" y1="2"  x2="37" y2="30" stroke="#e0bc78" stroke-width="0.4" opacity="0.5"/>
      <line x1="43" y1="2"  x2="43" y2="30" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Group 2 — vertical plank (left) -->
      <rect x="0"  y="32" width="16" height="32" fill="#bc8838" stroke="#5a3810" stroke-width="0.8"/>
      <line x1="5"  y1="34" x2="5"  y2="62" stroke="#d4aa68" stroke-width="0.4" opacity="0.5"/>
      <line x1="11" y1="34" x2="11" y2="62" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Group 2 — horizontal planks (right) -->
      <rect x="16" y="32" width="32" height="16" fill="#c09050" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="16" y="48" width="32" height="16" fill="#c8a060" stroke="#5a3810" stroke-width="0.8"/>
      <line x1="18" y1="38" x2="46" y2="38" stroke="#d4aa68" stroke-width="0.4" opacity="0.5"/>
      <line x1="18" y1="44" x2="46" y2="44" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="18" y1="54" x2="46" y2="54" stroke="#d4aa68" stroke-width="0.4" opacity="0.5"/>
      <line x1="18" y1="60" x2="46" y2="60" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="240" height="256" fill="url(#herringbone)"/>
</svg>
