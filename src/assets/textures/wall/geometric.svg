<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <pattern id="basket" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">

      <!-- ╔══════════╦══════════╗
           ║ H-planks ║ V-planks ║
           ╠══════════╬══════════╣
           ║ V-planks ║ H-planks ║
           ╚══════════╩══════════╝  basketweave parquet -->

      <!-- Top-left: 2 horizontal planks stacked -->
      <rect x="0"  y="0"  width="32" height="16" fill="#c49050" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="0"  y="16" width="32" height="16" fill="#b88040" stroke="#5a3810" stroke-width="0.8"/>
      <!-- grain lines -->
      <line x1="2"  y1="5"  x2="30" y2="5"  stroke="#d4a860" stroke-width="0.4" opacity="0.5"/>
      <line x1="2"  y1="10" x2="30" y2="10" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="2"  y1="21" x2="30" y2="21" stroke="#d4a860" stroke-width="0.4" opacity="0.5"/>
      <line x1="2"  y1="27" x2="30" y2="27" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Top-right: 2 vertical planks side by side -->
      <rect x="32" y="0"  width="16" height="32" fill="#d4a860" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="48" y="0"  width="16" height="32" fill="#c49050" stroke="#5a3810" stroke-width="0.8"/>
      <!-- grain lines -->
      <line x1="37" y1="2"  x2="37" y2="30" stroke="#e0bc78" stroke-width="0.4" opacity="0.5"/>
      <line x1="43" y1="2"  x2="43" y2="30" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="53" y1="2"  x2="53" y2="30" stroke="#e0bc78" stroke-width="0.4" opacity="0.5"/>
      <line x1="59" y1="2"  x2="59" y2="30" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Bottom-left: 2 vertical planks side by side -->
      <rect x="0"  y="32" width="16" height="32" fill="#b88040" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="16" y="32" width="16" height="32" fill="#c8a060" stroke="#5a3810" stroke-width="0.8"/>
      <!-- grain lines -->
      <line x1="5"  y1="34" x2="5"  y2="62" stroke="#d4a860" stroke-width="0.4" opacity="0.5"/>
      <line x1="10" y1="34" x2="10" y2="62" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="21" y1="34" x2="21" y2="62" stroke="#deb870" stroke-width="0.4" opacity="0.5"/>
      <line x1="27" y1="34" x2="27" y2="62" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

      <!-- Bottom-right: 2 horizontal planks stacked -->
      <rect x="32" y="32" width="32" height="16" fill="#c09050" stroke="#5a3810" stroke-width="0.8"/>
      <rect x="32" y="48" width="32" height="16" fill="#ba8848" stroke="#5a3810" stroke-width="0.8"/>
      <!-- grain lines -->
      <line x1="34" y1="37" x2="62" y2="37" stroke="#d4a860" stroke-width="0.4" opacity="0.5"/>
      <line x1="34" y1="43" x2="62" y2="43" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>
      <line x1="34" y1="53" x2="62" y2="53" stroke="#deb870" stroke-width="0.4" opacity="0.5"/>
      <line x1="34" y1="59" x2="62" y2="59" stroke="#8a6028" stroke-width="0.3" opacity="0.4"/>

    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#basket)"/>
</svg>
